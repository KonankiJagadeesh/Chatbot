<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varahi - AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .shape-1 { width: 400px; height: 400px; background: #ff758c; top: -100px; left: -100px; }
        .shape-2 { width: 500px; height: 500px; background: #4facfe; bottom: -150px; right: -100px; }

        .chat-container {
            width: 90%;
            max-width: 480px;
            height: 85vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        .chat-header {
            padding: 16px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chat-header-title {
            font-weight: 600;
            font-size: 1.15rem;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .online-dot {
            width: 8px; height: 8px;
            background: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            box-shadow: 0 0 6px #4ade80;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }
        .clear-btn {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 0.75rem;
            padding: 5px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
        }
        .clear-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.03); }

        /* ── Messages ── */
        .chat-messages {
            flex: 1;
            padding: 16px 18px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        .chat-messages::-webkit-scrollbar { width: 5px; }
        .chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.25); border-radius: 10px; }

        .message-wrapper {
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.3s ease-in-out;
        }
        .message-wrapper.user { align-items: flex-end; }
        .message-wrapper.bot  { align-items: flex-start; }

        .message {
            max-width: 82%;
            padding: 11px 15px;
            border-radius: 18px;
            font-size: 0.93rem;
            line-height: 1.45;
            word-wrap: break-word;
        }
        .message-bot {
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }
        .message-user {
            background: #fff;
            color: var(--primary);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .message strong { font-weight: 700; }

        /* Timestamp */
        .msg-time {
            font-size: 0.68rem;
            color: rgba(255,255,255,0.55);
            margin-top: 3px;
            padding: 0 4px;
        }
        .message-wrapper.user .msg-time { color: rgba(255,255,255,0.55); }

        /* ── Quick Reply Chips ── */
        .quick-replies {
            display: flex;
            flex-wrap: wrap;
            gap: 7px;
            padding: 8px 18px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }
        .chip {
            background: rgba(255,255,255,0.15);
            border: 1px solid rgba(255,255,255,0.3);
            color: #fff;
            font-size: 0.78rem;
            padding: 5px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
        }
        .chip:hover { background: rgba(255,255,255,0.3); transform: translateY(-1px); }
        .chip:active { transform: translateY(0); }

        /* ── Input Area ── */
        .chat-input-area {
            padding: 12px 16px;
            background: rgba(255,255,255,0.05);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .chat-input {
            flex: 1;
            padding: 11px 18px;
            border: none;
            border-radius: 30px;
            background: rgba(255,255,255,0.2);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.93rem;
            outline: none;
            transition: all 0.3s ease;
        }
        .chat-input::placeholder { color: rgba(255,255,255,0.65); }
        .chat-input:focus { background: rgba(255,255,255,0.3); box-shadow: 0 0 0 2px rgba(255,255,255,0.2); }

        .send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 44px; height: 44px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79,70,229,0.4);
            flex-shrink: 0;
        }
        .send-btn:hover { background: var(--primary-hover); transform: translateY(-2px); }
        .send-btn:active { transform: translateY(0); }
        .send-btn svg { width: 19px; height: 19px; fill: currentColor; margin-left: 3px; }

        /* ── Typing Indicator ── */
        .typing-indicator {
            display: none;
            gap: 4px;
            padding: 11px 15px;
            background: rgba(255,255,255,0.2);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            width: fit-content;
        }
        .dot {
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="chat-container">

        <!-- Header -->
        <div class="chat-header">
            <div class="chat-header-title">
                <span class="online-dot"></span>✨ Varahi
            </div>
            <button class="clear-btn" onclick="clearChat()">🗑 Clear Chat</button>
        </div>

        <!-- Messages -->
        <div class="chat-messages" id="chatMessages">
            <div class="message-wrapper bot">
                <div class="message message-bot">
                    Hi! I'm Varahi 😊 How can I help you today?
                </div>
                <span class="msg-time" id="initTime"></span>
            </div>

            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <!-- Quick Reply Chips -->
        <div class="quick-replies" id="quickReplies">
            <button class="chip" onclick="sendChip('Tell me a joke 😄')">Tell me a joke 😄</button>
            <button class="chip" onclick="sendChip('What is special today?')">📅 What's special today?</button>
            <button class="chip" onclick="sendChip('Recommend a movie 🎬')">Recommend a movie 🎬</button>
            <button class="chip" onclick="sendChip('Motivate me 💪')">Motivate me 💪</button>
            <button class="chip" onclick="sendChip('2 + 2 * 5')">🧮 2 + 2 * 5</button>
            <button class="chip" onclick="sendChip('Health tips 🏃')">Health tips 🏃</button>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input"
                   placeholder="Type a message or a math problem..."
                   autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>

    <script>
        const inputField    = document.getElementById("userInput");
        const chatMessages  = document.getElementById("chatMessages");
        const typingEl      = document.getElementById("typingIndicator");
        const quickReplies  = document.getElementById("quickReplies");

        // Set initial timestamp
        document.getElementById("initTime").textContent = nowTime();

        // Enter key sends message
        inputField.addEventListener("keydown", e => {
            if (e.key === "Enter") { e.preventDefault(); sendMessage(); }
        });

        function nowTime() {
            const d = new Date();
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        /** Render **bold** markdown in bot text */
        function renderMarkdown(text) {
            return text
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\n/g, '<br>');
        }

        function appendMessage(text, sender) {
            const wrapper = document.createElement("div");
            wrapper.classList.add("message-wrapper", sender);

            const bubble = document.createElement("div");
            bubble.classList.add("message", sender === "user" ? "message-user" : "message-bot");

            if (sender === "bot") {
                bubble.innerHTML = renderMarkdown(text);
            } else {
                bubble.textContent = text;
            }

            const timeSpan = document.createElement("span");
            timeSpan.classList.add("msg-time");
            timeSpan.textContent = nowTime();

            wrapper.appendChild(bubble);
            wrapper.appendChild(timeSpan);
            chatMessages.insertBefore(wrapper, typingEl);
            scrollToBottom();
        }

        function showTyping() {
            typingEl.style.display = "flex";
            chatMessages.appendChild(typingEl);
            scrollToBottom();
        }
        function hideTyping() { typingEl.style.display = "none"; }
        function scrollToBottom() { chatMessages.scrollTop = chatMessages.scrollHeight; }

        function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;
            inputField.value = "";

            // Hide quick replies after first message
            quickReplies.style.display = "none";

            appendMessage(text, "user");
            showTyping();

            fetch(`/chat/?message=${encodeURIComponent(text)}`)
                .then(r => r.json())
                .then(data => {
                    hideTyping();
                    appendMessage(data.response, "bot");
                })
                .catch(() => {
                    hideTyping();
                    appendMessage("⚠ Sorry, I'm having trouble connecting. Please refresh.", "bot");
                });
        }

        function sendChip(text) {
            inputField.value = text;
            sendMessage();
        }

        function clearChat() {
            // Clear session on backend
            fetch("/clear/").catch(() => {});

            // Clear all messages except the first welcome message
            const wrappers = chatMessages.querySelectorAll(".message-wrapper");
            wrappers.forEach((w, i) => { if (i > 0) w.remove(); });

            // Show quick replies again
            quickReplies.style.display = "flex";

            // Re-append typing indicator
            chatMessages.appendChild(typingEl);
        }
    </script>
</body>
</html>
