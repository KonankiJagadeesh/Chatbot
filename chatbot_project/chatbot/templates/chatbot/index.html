<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Varahi - AI Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.25);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            color: #333;
        }

        /* Abstract Background Shapes for extra flavor */
        .shape {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
        }
        .shape-1 {
            width: 400px;
            height: 400px;
            background: #ff758c;
            top: -100px;
            left: -100px;
        }
        .shape-2 {
            width: 500px;
            height: 500px;
            background: #4facfe;
            bottom: -150px;
            right: -100px;
        }

        .chat-container {
            width: 90%;
            max-width: 450px;
            height: 80vh;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid var(--glass-border);
            text-align: center;
            font-weight: 600;
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar for Chat Messages */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 10px;
        }

        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-in-out;
            word-wrap: break-word;
        }

        .message-bot {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            border-bottom-left-radius: 4px;
            border: 1px solid var(--glass-border);
        }

        .message-user {
            align-self: flex-end;
            background: #fff;
            color: var(--primary);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .chat-input-area {
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .chat-input:focus {
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 0 0 2px rgba(255,255,255,0.2);
        }

        .send-btn {
            background: var(--primary);
            color: #fff;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        .send-btn:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
        }

        .send-btn:active {
            transform: translateY(0);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            margin-left: 3px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 18px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            border: 1px solid var(--glass-border);
            width: fit-content;
            display: none;
        }

        .dot {
            width: 6px;
            height: 6px;
            background: #fff;
            border-radius: 50%;
            animation: typing 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes typing {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>

    <div class="chat-container">
        <div class="chat-header">
            ✨ Varahi
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message message-bot">
                Hi! I'm Varahi. How can I help you today? 😊
            </div>
            
            <div class="typing-indicator" id="typingIndicator">
                <div class="dot"></div>
                <div class="dot"></div>
                <div class="dot"></div>
            </div>
        </div>

        <div class="chat-input-area">
            <input type="text" id="userInput" class="chat-input" placeholder="Type your message..." autocomplete="off">
            <button class="send-btn" onclick="sendMessage()" id="sendBtn">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("userInput");
        const chatMessages = document.getElementById("chatMessages");
        const typingIndicator = document.getElementById("typingIndicator");

        // Allow sending with Enter key
        inputField.addEventListener("keydown", function(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                sendMessage();
            }
        });

        function appendMessage(text, sender) {
            const messageDiv = document.createElement("div");
            messageDiv.classList.add("message");
            messageDiv.classList.add(sender === 'user' ? "message-user" : "message-bot");
            messageDiv.textContent = text;
            
            // Insert before typing indicator
            chatMessages.insertBefore(messageDiv, typingIndicator);
            scrollToBottom();
        }

        function showTyping() {
            typingIndicator.style.display = "flex";
            chatMessages.appendChild(typingIndicator); // Move to bottom
            scrollToBottom();
        }

        function hideTyping() {
            typingIndicator.style.display = "none";
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function sendMessage() {
            const text = inputField.value.trim();
            if (text === "") return;

            // Clear input and show user message
            inputField.value = "";
            appendMessage(text, "user");

            // Show typing indicator while waiting
            showTyping();

            // Make API request to Django backend
            fetch(`/chat/?message=${encodeURIComponent(text)}`)
                .then(response => response.json())
                .then(data => {
                    hideTyping();
                    appendMessage(data.response, "bot");
                })
                .catch(error => {
                    hideTyping();
                    appendMessage("Sorry, I'm having trouble connecting to the server.", "bot");
                    console.error("Error:", error);
                });
        }
    </script>
</body>
</html>
